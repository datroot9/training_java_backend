version: '3.8'

services:
  spring-app:
    build: .
    container_name: student_backend
    network_mode: "host"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/student_management?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver

