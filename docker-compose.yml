services:
  spring-app:
    build: .
    container_name: student_backend
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # host.docker.internal reaches MySQL on the host machine (not localhost inside the container)
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/student_management?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
